- name: Deploy to EC2
  uses: appleboy/ssh-action@v0.1.10
  with:
    host: 15.207.184.18
    username: ubuntu
    key: ${{ secrets.EC2_KEY }}
    script: |
      # Stop and remove specific containers (safe)
      sudo docker stop backend || true
      sudo docker stop frontend || true

      sudo docker rm backend || true
      sudo docker rm frontend || true

      # Remove any container using ports (extra safety)
      sudo fuser -k 8000/tcp || true
      sudo fuser -k 3000/tcp || true

      # Pull latest images
      sudo docker pull 2201409/infra-backend
      sudo docker pull 2201409/infra-frontend

      # Run containers with fixed names
      sudo docker run -d \
        --name backend \
        --restart unless-stopped \
        -p 8000:8080 \
        2201409/infra-backend

      sudo docker run -d \
        --name frontend \
        --restart unless-stopped \
        -p 3000:80 \
        2201409/infra-frontend