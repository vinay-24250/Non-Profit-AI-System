name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t 2201409/infra-backend ./backend -f infra/Dockerfile.backend
          docker push 2201409/infra-backend

      - name: Build & Push Frontend
        run: |
          docker build -t 2201409/infra-frontend ./frontend -f infra/Dockerfile.frontend
          docker push 2201409/infra-frontend

      - name: Deploy to EC2
  uses: appleboy/ssh-action@v0.1.10
  with:
    host: 3.6.190.26
    username: ubuntu
    key: ${{ secrets.EC2_KEY }}
    script: |
      cd /home/ubuntu/Non-Profit-AI-System

      git reset --hard
      git pull origin main

      echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > backend/.env

      cd infra

      # Stop & remove old containers safely
      sudo docker stop $(sudo docker ps -q) 2>/dev/null || true
      sudo docker rm $(sudo docker ps -aq) 2>/dev/null || true

      # Remove old images (IMPORTANT)
      sudo docker system prune -af

      # Pull latest images from Docker Hub
      sudo docker compose pull

      # Recreate containers with latest images
      sudo docker compose up -d --force-recreate